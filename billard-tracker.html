<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard & Dart Tracker</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; }
    header { background:#333; color:#fff; padding:1rem; text-align:center; }
    main { display:flex; flex-wrap: wrap; padding:1rem; gap:1rem; justify-content:center; }
    .table-card { background:#fff; border-radius:10px; padding:1rem; width:300px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    .table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
    .status { font-weight:bold; padding:0.2rem 0.5rem; border-radius:5px; color:#fff; }
    .status.free { background:grey; }
    .status.occupied { background:green; }
    input, button { padding:0.3rem; margin:0.2rem 0; width:100%; box-sizing:border-box; }
    h2 { margin:0.5rem 0; font-size:1.2rem; }
    .history { max-height:150px; overflow:auto; margin-top:0.5rem; border-top:1px solid #ccc; padding-top:0.5rem; }
    .waiting-list { background:#fff; border-radius:10px; padding:1rem; width:300px; box-shadow:0 2px 8px rgba(0,0,0,0.2); margin-top:1rem; }
    .waiting-item { display:flex; justify-content:space-between; align-items:center; padding:0.3rem 0; border-bottom:1px solid #eee; }
    .waiting-controls button { margin-left:0.2rem; }
    @media(max-width:768px){ main { flex-direction:column; align-items:center; } }
    
    /* NEW LAYOUT */
  .layout {
      display: grid;
      grid-template-columns: 3fr 1fr; /* tables big, waiting list smaller */
      gap: 1rem;
      padding: 1rem;
  }

  /* Tables area */
  main {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: flex-start;
  }

  /* Keep waiting list on right */
  .waiting-list {
      background:#fff;
      border-radius:10px;
      padding:1rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
      height: calc(100vh - 120px); /* fills screen nicely */
      overflow-y: auto;
  }

  /* Responsive: stack on smaller screens */
  @media(max-width: 900px){
      .layout {
          grid-template-columns: 1fr;
      }
      .waiting-list {
          height: auto;
      }
  }

  .waiting-item.next-up {
    background: #e6ffe6;
    border-left: 6px solid #2ecc71;
    padding-left: 5px;
}


</style>
</head>
<body>

<header>
    <h1>Billiard & Dart Tracker</h1>
</header>

<div class="layout">
    <main id="dashboard"></main>

    <div class="waiting-list">

      <h2>🎱 Billiard Waiting List</h2>
      <input type="text" id="waitNameBilliard" placeholder="Customer Name">
      <input type="text" id="waitPagerBilliard" placeholder="Pager Number">
      <button onclick="addWaiting('billiard')">Add to Billiard List</button>
      <div id="waitingListBilliard"></div>

      <hr style="margin: 15px 0;">

      <h2>🎯 Dart Waiting List</h2>
      <input type="text" id="waitNameDart" placeholder="Customer Name">
      <input type="text" id="waitPagerDart" placeholder="Pager Number">
      <button onclick="addWaiting('dart')">Add to Dart List</button>
      <div id="waitingListDart"></div>

    </div>

</div>


</div>

<script>

// --- Config ---
const tablesConfig = [
    { id: 1, type: 'billiard' },
    { id: 2, type: 'billiard' },
    { id: 3, type: 'billiard' },
    { id: 4, type: 'billiard' },
    { id: 5, type: 'billiard' },
    { id: 6, type: 'dart' }
];

const pricing = {
    billiard: { weekday: 12, weekend: 16, discountBefore17: 4 },
    dart: 8
};

// --- Load State ---
let tables = JSON.parse(localStorage.getItem('tables')) || tablesConfig.map(t => ({
    ...t,
    customer: '',
    timer: 0,
    running: false,
    startTime: null,
    history: []
}));
let waitingList = JSON.parse(localStorage.getItem('waitingList')) || {
    billiard: [],
    dart: []
};

// --- Helpers ---
function saveState() {
    localStorage.setItem('tables', JSON.stringify(tables));
    localStorage.setItem('waitingList', JSON.stringify(waitingList));
}

function formatTime(date) {
    return new Date(date).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function getBilliardRate(date) {
    // date = JS Date object
    let day = date.getDay(); // 0=Sunday, 1=Monday ... 6=Saturday

    // Shift day: early hours belong to previous day
    const hour = date.getHours();
    if(hour < 6){ // midnight to 05:59 counts as previous day
        day = (day + 6) % 7; // subtract 1 modulo 7
    }

    // Determine base rate
    // Sunday–Thursday = 12€, Friday–Saturday = 16€
    if(day === 5 || day === 6) return 16; // Friday or Saturday
    return 12; // Sunday–Thursday
}


function calculatePrice(table) {
    if (!table.startTime) return 0;
    const now = new Date();
    let durationMs = table.running ? now - new Date(table.startTime) : table.timer;
    durationMs -= 5*60*1000; // 5-min grace
    if (durationMs < 0) durationMs = 0;
    let minutes = Math.ceil(durationMs/1000/60/15)*15; // 15-min increments
    let hours = minutes / 60;
    if (table.type === 'dart') return hours * pricing.dart;
    const day = new Date(table.startTime).getDay();
    // let rate = (day===5||day===6) ? pricing.billiard.weekend : pricing.billiard.weekday;
    let rate = getBilliardRate(now);
    const hourOfDay = new Date(table.startTime).getHours();
    // if(hourOfDay<17) rate -= pricing.billiard.discountBefore17;
    let discount = 0
    startTime = new Date(table.startTime)
    if (startTime.getHours()<17 && startTime.getHours()>6) { // discount for before 17:00
      const seventeen = new Date(table.startTime);
      seventeen.setHours(17, 0, 0, 0);
      let minutesBeforeDiscountEnd = 0;
      let diffMs = 0
      if (now.getHours()>=17) {
        diffMs = seventeen - startTime; // difference in milliseconds
      }
      else {
        diffMs = now - startTime; // difference in milliseconds
      }
      minutesBeforeDiscountEnd = Math.ceil(diffMs / 60000); // convert to minutes
      const blocks15 = Math.round(minutesBeforeDiscountEnd / 15);
      discount = blocks15
    }
    return (hours*rate).toFixed(2)-discount;
}

function clearHistory(id) {
    if(!confirm('Are you sure you want to clear the history for this table?')) return;
    const table = tables.find(t => t.id === id);
    table.history = [];
    saveState();
    renderDashboard();
}


// --- Render ---
function renderDashboard() {
    const dashboard = document.getElementById('dashboard');
    dashboard.innerHTML = '';
    tables.forEach(table => {
        const div = document.createElement('div');
        div.className = 'table-card';
        div.innerHTML = `
            <div class="table-header">
                <strong>${table.type==='dart'?'🎯 Dart Board':'🎱 Billard'}</strong>
                <span class="status ${table.running?'occupied':'free'}">${table.running?'Occupied':'Free'}</span>
            </div>
            <input style="font-weight:bold" placeholder="Customer Name" value="${table.customer}" onchange="tableCustomer(${table.id}, this.value)">
            <input type="time" id="manualStart${table.id}" placeholder="HH:MM">
            <button onclick="setManualStart(${table.id})">Set Start Time</button>
            <div>Current Duration: <span id="duration${table.id}">0h 0m 0s</span></div>
            <div>Start: <span id="start${table.id}">${table.startTime?formatTime(table.startTime):'-'}</span></div>
            <div>Price: €<span id="price${table.id}">${calculatePrice(table)}</span></div>
            <button onclick="startStop(${table.id})">${table.running?'Stop':'Start'}</button>
            <button onclick="clearHistory(${table.id})">Clear History</button>
            <div class="history">
                <strong>History:</strong>
                ${table.history.map(h=>`<div><strong>${h.customer}</strong>| ${formatTime(h.start)} - ${formatTime(h.end)} | ${Math.round(h.duration/60000)}m | €${h.price}</div>`).join('')}
            </div>
        `;
        // if(table.type === 'dart') div.style.background = '#e0e0e0';  // light grey
        dashboard.appendChild(div);
    }); 
}


function renderWaitingList() {
    renderSingleList('billiard', 'waitingListBilliard', '🎱');
    renderSingleList('dart', 'waitingListDart', '🎯');
}



function renderSingleList(type, elementId, icon) {
    const container = document.getElementById(elementId);
    container.innerHTML = '';

    // Count how many free tables of this type exist
    let freeCount = 0;
    if (type === 'billiard') {
        freeCount = tables.filter(t => t.type === 'billiard' && !t.running).length;
    } else if (type === 'dart') {
        const dart = tables.find(t => t.type === 'dart');
        freeCount = dart && !dart.running ? 1 : 0;
    }

    waitingList[type].forEach((w, i) => {
        const div = document.createElement('div');
        div.className = 'waiting-item';

        // Highlight first 'freeCount' people
        if (i < freeCount) {
            div.classList.add('next-up');
        }

        div.innerHTML = `
            <span>
                <strong>${i + 1}.</strong>
                <strong>${icon} ${w.name} </strong> (Pager: ${w.pager}) — ${formatTime(w.arrival)}
            </span>
            <span class="waiting-controls">
                <button onclick="moveWaiting('${type}', ${i}, -1)">↑</button>
                <button onclick="moveWaiting('${type}', ${i}, 1)">↓</button>
                <button onclick="assignToFreeTable('${type}', ${i})">✅</button> <!-- assign to free table -->
                <button onclick="removeWaiting('${type}', ${i})">❌</button> <!-- remove from list -->
            </span>
        `;
        container.appendChild(div);
    });
}




// --- Actions ---
function tableCustomer(id, name) {
    const table = tables.find(t=>t.id===id);
    table.customer = name;
    saveState();
}

function setManualStart(id) {
    const table = tables.find(t => t.id === id);
    const input = document.getElementById(`manualStart${id}`).value;
    if(!input) return alert('Enter a valid time (HH:MM)');

    const [hours, minutes] = input.split(':').map(Number);
    if(isNaN(hours) || isNaN(minutes)) return alert('Invalid time format');

    // Set startTime to today at entered time
    const now = new Date();
    table.startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
    table.running = true;
    table.timer = 0;
    saveState();
    renderDashboard();
    renderWaitingList(); 
}

function startStop(id) {
    const table = tables.find(t=>t.id===id);
    if(table.running) {
        // stop
        table.running=false;
        table.timer = new Date() - new Date(table.startTime);
        table.history.unshift({
            customer: table.customer,
            start: table.startTime,
            end: new Date(),
            duration: table.timer,
            price: calculatePrice(table)
        });
        table.startTime = null;
        table.customer='';
    } else {
        // start
        table.running=true;
        table.startTime = new Date();
        table.timer=0;
    }
    saveState();
    renderDashboard();
    renderWaitingList(); 
}


function addWaiting(type) {
    const name = document.getElementById(
        type === 'billiard' ? 'waitNameBilliard' : 'waitNameDart'
    ).value.trim();
    const pager = document.getElementById(
        type === 'billiard' ? 'waitPagerBilliard' : 'waitPagerDart'
    ).value.trim();
    if (!name) {
        alert("Enter a name");
        return;
    }
    waitingList[type].push({
        name,
        pager,
        arrival: new Date()
    });

    // clear inputs
    document.getElementById(
        type === 'billiard' ? 'waitNameBilliard' : 'waitNameDart'
    ).value = '';

    document.getElementById(
        type === 'billiard' ? 'waitPagerBilliard' : 'waitPagerDart'
    ).value = '';

    saveState();
    renderWaitingList();
}


function moveWaiting(type, index, dir) {
    const newIndex = index + dir;
    if (newIndex < 0 || newIndex >= waitingList[type].length) return;

    [waitingList[type][index], waitingList[type][newIndex]] =
        [waitingList[type][newIndex], waitingList[type][index]];

    saveState();
    renderWaitingList();
}

function removeWaiting(type, index) {
    waitingList[type].splice(index, 1);
    saveState();
    renderWaitingList();
}

function assignToFreeTable(type, index) {
    const w = waitingList[type][index];

    // Find first free table or Dart
    const freeTable = tables.find(t => t.type===type && !t.running && !t.customer);

    if(!freeTable){
        alert(`No free ${type==='billiard'?'billiard table':'dart board'} available!`);
        return;
    }

    // Assign customer
    freeTable.customer = w.name;
    freeTable.running = false;  // timer not started automatically
    freeTable.startTime = null;
    freeTable.startTime = new Date();
    freeTable.running = true;

    // Remove from waiting list
    waitingList[type].splice(index,1);

    saveState();
    renderDashboard();
    renderWaitingList();
}




// --- Timer Updates ---
setInterval(()=>{
    tables.forEach(table=>{
        if(table.running){
            const durationMs = new Date() - new Date(table.startTime);
            document.getElementById(`duration${table.id}`).innerText = `${Math.floor(durationMs/1000/60/60)}h ${Math.floor(durationMs/1000/60%60)}m ${Math.floor((durationMs/1000)%60)}s`;
            document.getElementById(`price${table.id}`).innerText = calculatePrice(table);
            document.getElementById(`start${table.id}`).innerText = formatTime(table.startTime);
        }
    });
},1000);

// --- Init ---
renderDashboard();
renderWaitingList();
</script>
</body>
</html>
